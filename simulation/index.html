<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peer2Nodes Simulation</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --font:      'Courier New', Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header .logo { font-size: 15px; letter-spacing: 3px; color: var(--accent); font-weight: bold; }
    header .subtitle { color: var(--muted); font-size: 11px; letter-spacing: 1px; }

    /* ── Main split ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Instances panel ── */
    #instances-panel {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .panel-title {
      padding: 8px 14px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .create-row {
      display: flex;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .create-row input { flex: 1; min-width: 0; }

    #instances-list { flex: 1; overflow-y: auto; }

    .inst-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }
    .inst-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .inst-name { flex: 1; font-size: 12px; }
    .inst-id { font-size: 10px; color: var(--muted); }

    /* ── Channels panel ── */
    #channels-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .connect-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .connect-bar .arrow { color: var(--muted); }

    .share-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .share-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .share-uri-wrap {
      display: flex;
      gap: 6px;
      width: 100%;
    }
    #share-uri {
      flex: 1;
      min-width: 0;
    }
    #qr-preview {
      width: 160px;
      height: 160px;
      border: 1px solid var(--border);
      border-radius: 4px;
      object-fit: contain;
      background: #fff;
      align-self: flex-start;
    }
    .share-help {
      font-size: 11px;
      color: var(--muted);
    }

    #channels-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }

    .ch-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      overflow: hidden;
    }

    .ch-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .ch-peers { flex: 1; font-size: 13px; }
    .ch-arrow { color: var(--muted); }

    .ch-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.5px;
    }
    .st-ready { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
    .st-auth  { background: rgba(210,169,34,.15); color: var(--yellow); border: 1px solid rgba(210,169,34,.3); }
    .st-error { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .st-other { background: rgba(139,148,158,.15); color: var(--muted); border: 1px solid var(--border); }

    .btn-close-ch {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      line-height: 1;
    }
    .btn-close-ch:hover { color: var(--red); }

    /* Message history */
    .msg-history {
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 160px;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
    }
    .msg-row { display: flex; gap: 6px; align-items: baseline; font-size: 12px; }
    .msg-who { font-weight: bold; flex-shrink: 0; }
    .msg-text { flex: 1; color: var(--text); }
    .msg-ack { font-size: 10px; color: var(--green); }

    /* Compose row */
    .ch-compose {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      align-items: center;
    }
    .ch-compose .msg-input { flex: 1; min-width: 0; }

    /* Empty state */
    .empty-hint {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 40px 20px;
    }

    /* ── Log panel ── */
    #log-panel {
      height: 200px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .log-header button { margin-left: auto; padding: 2px 8px; font-size: 10px; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 14px;
      font-size: 12px;
      line-height: 1.6;
    }
    .log-row { display: flex; gap: 8px; }
    .lt { color: var(--muted); flex-shrink: 0; }
    .li { font-weight: bold; flex-shrink: 0; }
    .le { color: var(--text); }
    .ld { color: var(--muted); }

    /* ── Form controls ── */
    input, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 4px;
      outline: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus, select:focus { border-color: var(--accent); }

    button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      font-family: var(--font);
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); }
    button.primary:hover { background: rgba(88,166,255,.1); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <header>
    <span class="logo">PEER2NODES</span>
    <span class="subtitle">SIMULATION</span>
  </header>

  <div class="main">

    <!-- Instances panel -->
    <section id="instances-panel">
      <div class="panel-title">INSTANCES</div>
      <div class="create-row">
        <input id="inp-name" type="text" placeholder="Instance name…" />
        <button id="btn-create" class="primary">+ New</button>
      </div>
      <div id="instances-list"></div>
    </section>

    <!-- Channels panel -->
    <section id="channels-panel">
      <div class="connect-bar">
        <span style="color:var(--muted);font-size:10px;letter-spacing:1px">CONNECT</span>
        <select id="sel-initiator" class="inst-select"></select>
        <span class="arrow">→</span>
        <select id="sel-responder" class="inst-select"></select>
        <button id="btn-open-channel" class="primary">Open Channel</button>
      </div>
      <div class="share-bar">
        <div class="share-row">
          <span style="color:var(--muted);font-size:10px;letter-spacing:1px">SHARE CONNECTION INFO</span>
          <select id="sel-share-instance" class="inst-select"></select>
          <button id="btn-generate-share" class="primary">Generate NFC + QR</button>
          <button id="btn-copy-share">Copy</button>
          <button id="btn-share-native">Native Share</button>
          <button id="btn-nfc-write">NFC Write</button>
          <button id="btn-nfc-read">NFC Read</button>
        </div>
        <div class="share-uri-wrap">
          <input id="share-uri" type="text" placeholder="Generated peer2nodes://connect URI…" />
          <button id="btn-connect-from-share">Connect from Shared URI</button>
        </div>
        <img id="qr-preview" alt="No QR code generated" />
        <div class="share-help">On mobile Chrome (HTTPS), NFC read/write uses Web NFC. Else, paste/share URI manually.</div>
      </div>
      <div id="channels-list">
        <div class="empty-hint">Create instances above, then open a channel between two of them.</div>
      </div>
    </section>

  </div>

  <!-- Event log -->
  <section id="log-panel">
    <div class="log-header">
      EVENT LOG
      <button id="btn-clear-log">Clear</button>
    </div>
    <div id="log"></div>
  </section>

  <script type="module" src="./app.js"></script>
</body>
</html>
